<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Divisiones</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container mt-4">

    <h2>Divisiones</h2>

    <button type="button"
            class="btn btn-primary mb-3"
            id="btnNuevaDivision">
        Nueva División
    </button>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Clave</th>
            <th>Nombre</th>
            <th>Activo</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="division : ${divisiones}">
            <td th:text="${division.id}"></td>
            <td th:text="${division.clave}"></td>
            <td th:text="${division.nombre}"></td>
            <td th:text="${division.activo} ? 'Sí' : 'No'"></td>
            <td>
                <button type="button"
                        class="btn btn-warning btn-sm btn-editar"
                        th:attr="data-id=${division.id}">
                    Editar
                </button>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalDivision" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/consola/divisiones/save}"
                  th:object="${division}"
                  method="post">

                <input type="hidden" th:field="*{id}" id="divisionId"/>

                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Nueva División</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Clave</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{clave}"
                               id="claveInput"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{nombre}"
                               id="nombreInput"
                               required>
                    </div>

                    <div class="form-check">
                        <input type="checkbox"
                               class="form-check-input"
                               th:field="*{activo}"
                               id="activoInput">
                        <label class="form-check-label">Activo</label>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button type="submit"
                            class="btn btn-success">
                        Guardar
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/Divisiones.js}"></script>

</body>
</html>
