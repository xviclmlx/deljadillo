<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Ofertas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:replace="fragments/navbar :: menu"></nav>

<div class="container mt-4">

    <h2>Listado de Ofertas Educativas</h2>

    <button class="btn btn-success mb-3" id="btnNuevaOferta" onclick="abrirModalNueva()">
        Nueva Oferta
    </button>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Modalidad</th>
            <th>División</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <!-- 🔥 IMPORTANTE: ahora el tbody tiene id="tablaOfertas" -->
        <tbody id="tablaOfertas">
        <tr th:each="oferta : ${ofertas}" th:id="'fila-' + ${oferta.id}">
            <td th:text="${oferta.id}"></td>
            <td>
                <img th:src="${oferta.imagen}" style="max-height:60px;object-fit:contain">
            </td>
            <td th:text="${oferta.nombreOferta}"></td>
            <td th:text="${oferta.modalidad}"></td>
            <td th:text="${oferta.division != null ? oferta.division.nombre : 'Sin división'}"></td>
            <td>
                <button class="btn btn-warning btn-sm" th:attr="onclick='editarOferta(' + ${oferta.id} + ')'">
                    Editar
                </button>
                <button class="btn btn-danger btn-sm" th:attr="onclick='eliminarOferta(' + ${oferta.id} + ')'">
                    Eliminar
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalOferta" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- 🔥 IMPORTANTE: ahora el form tiene id="formOferta" y NO usa th:action -->
            <form id="formOferta">
                <div class="modal-header">
                    <h5 class="modal-title">Oferta Educativa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="id" name="id">

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" class="form-control" id="nombreOferta" name="nombreOferta" required>
                    </div>

                    <div class="mb-3">
                        <label>Modalidad</label>
                        <input type="text" class="form-control" id="modalidad" name="modalidad">
                    </div>

                    <div class="mb-3">
                        <label>Imagen (URL)</label>
                        <input type="text" class="form-control" id="imagen" name="imagen" required>
                    </div>

                    <div class="mb-3">
                        <label>División</label>
                        <select class="form-select" id="division" name="division.id">
                            <option value="">Seleccionar división</option>
                            <option th:each="d : ${divisiones}" th:value="${d.id}" th:text="${d.nombre}"></option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/ofertaEducativa.js"></script>

</body>
</html>
