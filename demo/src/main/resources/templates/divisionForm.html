<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>División</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav th:replace="fragments/navbar :: menu"></nav>

<div class="container py-5">

    <div class="card shadow rounded-4 col-md-6 mx-auto">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">División</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/consola/divisiones/save}"
                  method="post"
                  th:object="${division}">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Clave</label>
                    <input type="text" th:field="*{clave}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input"
                           type="checkbox"
                           th:field="*{activo}">
                    <label class="form-check-label">
                        División Activa
                    </label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>

                    <a th:href="@{/consola/divisiones}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>
<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Launch demo modal
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        ...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
