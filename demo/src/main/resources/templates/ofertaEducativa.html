<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <nav th:replace="fragments/navbar :: menu"></nav>
    <main>
        <section id="ofertaEducativa">
            <h2>Oferta Educativa Section</h2>
            <p>Esto es la sección de </p>
            <div class="container">
                <div class="card" th:each="oferta : ${ofertas}">
                    <div class="card-body">
                        <span th:text="${oferta.id}"></span>
                        <img th:src="${oferta.imagen}" class="card-img-top img-fluid" style="max-height:100px;object-fit:contain" alt="">
                        <h3 th:text="${oferta.nombreOferta}">Nombre de la ofertas</h3>
                        <p th:text="${oferta.modalidad}">Nodalidad de la Oferta</p>
                 <!--   <div th:if="${oferta.perfilEgreso != null}">
                        <p th:text="${oferta.perfilEgreso.descripcion}"></p>
                        <p th:text="${oferta.perfilEgreso.habilidadesTransversales}"></p>
                        <p th:text="${oferta.perfilEgreso.habilidadesEspecificas}"></p>
                        </div>    -->
                    </div>
                </div>
            </div>
        </section>
    </main>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-7E1t7V0Jx8JZz7Tn+8Rj9D0r5x9R8B8KpD6Y9L0Y0Zr8QJ8Z4p9R8Z4Qp0K"
        crossorigin="anonymous"></script>
        
</body>
</html>
